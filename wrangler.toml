name = "cloudflare-light-blog"
main = "src/worker.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# ============================================
# D1 数据库绑定
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "blog-db"
database_id = "${DB_ID}"

# ============================================
# R2 存储绑定
# ============================================
[[r2_buckets]]
binding = "R2"
bucket_name = "blog-images"

# CORS 配置已迁移至后台网站设置中
# [vars]
# ALLOWED_ORIGIN = "*"

[observability]
enabled = true

[observability.logs]
enabled = true
persist = true
invocation_logs = true