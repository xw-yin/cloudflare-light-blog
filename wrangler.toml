name = "cloudflare-light-blog"
main = "src/worker.js"
compatibility_date = "2024-05-01"
compatibility_flags = ["nodejs_compat"]

# ============================================
# D1 数据库绑定
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "blog-db"
database_id = "a55bc271-25cb-4a47-a4aa-5dca0d176933"

# ============================================
# R2 存储绑定
# ============================================
[[r2_buckets]]
binding = "R2"
bucket_name = "blog-images"

# CORS 配置（设置为你的博客域名，或保留 * 允许所有来源）
[vars]
ALLOWED_ORIGIN = "*"

[observability]
enabled = true

[observability.logs]
enabled = true
persist = true
invocation_logs = true